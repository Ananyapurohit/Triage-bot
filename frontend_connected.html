<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ED Triage XAI — Clinical Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<style>
/* ═══════════════ TOKENS ═══════════════ */
:root{
  --bg0:#07090f; --bg1:#0d1117; --bg2:#131822; --bg3:#1a2030;
  --bg4:#212840; --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.13);
  --muted:#3d4f6e; --dim:#6b7fa3; --soft:#9baec8; --body:#ccd6f6; --bright:#e8eeff;
  --cyan:#38bdf8; --cyan2:rgba(56,189,248,.12); --cyan3:rgba(56,189,248,.25);
  --red:#f87171;  --red2:rgba(248,113,113,.12);  --red3:rgba(248,113,113,.3);
  --amber:#fbbf24;--amb2:rgba(251,191,36,.12);   --amb3:rgba(251,191,36,.28);
  --green:#34d399;--grn2:rgba(52,211,153,.12);   --grn3:rgba(52,211,153,.28);
  --vio:#a78bfa;  --vio2:rgba(167,139,250,.12);
  --serif:'Playfair Display',serif;
  --sans:'Plus Jakarta Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --r8:8px; --r12:12px; --r16:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:var(--sans);background:var(--bg0);color:var(--body);min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 15% 5%,rgba(56,189,248,.055) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 95%,rgba(167,139,250,.045) 0%,transparent 55%),
    linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:auto,auto,52px 52px,52px 52px;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:99px}

/* ── LAYOUT ── */
.shell{position:relative;z-index:1;display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{
  width:224px;flex-shrink:0;background:var(--bg1);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{padding:20px 18px 16px;border-bottom:1px solid var(--line)}
.brand-mark{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.brand-hex{
  width:32px;height:32px;border-radius:var(--r8);
  background:linear-gradient(135deg,var(--cyan),#0284c7);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.brand-name{font-family:var(--serif);font-size:15px;color:var(--bright);line-height:1.2}
.brand-sub{font-size:10px;color:var(--dim);line-height:1.55;margin-top:6px}
.nav-sec{padding:12px 0 2px}
.nav-sec-lbl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;padding:0 18px 6px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:8px 18px;
  cursor:pointer;font-size:12.5px;font-weight:500;color:var(--dim);
  transition:all .15s;border-left:2px solid transparent;
}
.nav-item:hover{color:var(--body);background:rgba(255,255,255,.03)}
.nav-item.on{color:var(--cyan);border-left-color:var(--cyan);background:var(--cyan2)}
.nav-ico{font-size:13px;width:20px;text-align:center;flex-shrink:0}
.sidebar-foot{
  margin-top:auto;padding:14px 18px;border-top:1px solid var(--line);
}
.api-card{
  border:1px solid var(--line2);border-radius:var(--r8);
  padding:9px 12px;background:rgba(255,255,255,.03);
}
.api-row{display:flex;align-items:center;gap:7px}
.api-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.api-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.api-dot.dead{background:var(--red)}
.api-dot.spin{background:var(--amber);animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.api-lbl{font-size:11px;font-weight:600}
.api-url{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:3px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;
  background:rgba(7,9,15,.75);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;
}
.topbar-l{display:flex;align-items:center;gap:12px}
.page-title{font-family:var(--serif);font-size:19px;font-style:italic;color:var(--bright)}
.live-chip{
  display:flex;align-items:center;gap:5px;
  background:var(--grn2);border:1px solid var(--grn3);
  border-radius:99px;padding:3px 10px;
  font-size:10px;color:var(--green);font-weight:600;letter-spacing:.3px;
}
.live-chip-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
.topbar-r{display:flex;align-items:center;gap:9px}
.model-sel-wrap{
  display:flex;align-items:center;gap:7px;
  background:var(--bg3);border:1px solid var(--line2);
  border-radius:var(--r8);padding:5px 10px;
}
.model-sel-wrap label{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.model-sel-wrap select{
  background:transparent;border:none;color:var(--body);
  font-family:var(--sans);font-size:12px;font-weight:500;
  outline:none;cursor:pointer;
}
.model-sel-wrap select option{background:var(--bg2)}

/* ── PAGE ── */
.page{flex:1;padding:22px 26px;overflow-y:auto}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r16);padding:18px}
.card-lbl{
  font-size:9px;text-transform:uppercase;letter-spacing:2px;
  color:var(--dim);font-weight:700;margin-bottom:14px;
  display:flex;align-items:center;gap:7px;
}
.card-lbl-bar{width:2px;height:12px;border-radius:1px;flex-shrink:0}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ── STAT TILES ── */
.tile{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r12);padding:14px 16px;
  position:relative;overflow:hidden;
}
.tile-accent{position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r12) var(--r12) 0 0}
.tile-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;margin-bottom:6px}
.tile-val{font-family:var(--serif);font-size:28px;color:var(--bright);line-height:1}
.tile-sub{font-size:10px;color:var(--dim);margin-top:5px}

/* ── FORM ── */
.sec-head{
  font-size:9px;text-transform:uppercase;letter-spacing:2px;
  color:var(--cyan);font-weight:700;margin-bottom:9px;
  padding-bottom:6px;border-bottom:1px solid var(--cyan2);
}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:var(--soft);font-weight:500}
.fg input,.fg select{
  background:rgba(255,255,255,.04);border:1px solid var(--line2);
  border-radius:var(--r8);padding:7px 10px;color:var(--body);
  font-family:var(--sans);font-size:12px;outline:none;
  transition:border-color .18s,background .18s;width:100%;
}
.fg input:focus,.fg select:focus{border-color:var(--cyan);background:var(--cyan2)}
.fg select option{background:var(--bg2)}
.fg input[data-warn]{border-color:var(--red)!important}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fsec{margin-bottom:15px}

/* ── BUTTONS ── */
.btn-run{
  width:100%;padding:11px;border-radius:var(--r12);border:none;
  background:linear-gradient(135deg,var(--cyan),#0369a1);
  color:#fff;font-family:var(--sans);font-size:13px;font-weight:700;
  cursor:pointer;letter-spacing:.3px;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-run:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(56,189,248,.28)}
.btn-run:active{transform:none}
.btn-run:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-xs{
  padding:5px 12px;border-radius:6px;border:1px solid var(--line2);
  background:transparent;color:var(--dim);font-family:var(--sans);
  font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;
}
.btn-xs:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-xs.sel{border-color:var(--cyan);color:var(--cyan);background:var(--cyan2)}
.btn-ov{
  flex:1;padding:7px 4px;border-radius:7px;border:1px solid;
  font-family:var(--sans);font-size:11px;font-weight:700;
  cursor:pointer;text-align:center;transition:all .15s;
}
.btn-ov.h{background:var(--red2);border-color:var(--red3);color:#fca5a5}
.btn-ov.m{background:var(--amb2);border-color:var(--amb3);color:#fcd34d}
.btn-ov.l{background:var(--grn2);border-color:var(--grn3);color:#6ee7b7}
.btn-ov:hover{transform:translateY(-1px)}

/* ── PREDICTION HERO ── */
.pred-hero{border-radius:var(--r16);padding:22px 20px;text-align:center;position:relative;overflow:hidden}
.pred-hero.H{background:var(--red2);border:1px solid var(--red3)}
.pred-hero.M{background:var(--amb2);border:1px solid var(--amb3)}
.pred-hero.L{background:var(--grn2);border:1px solid var(--grn3)}
.pred-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--soft);margin-bottom:5px}
.pred-word{font-family:var(--serif);font-size:52px;line-height:1;font-style:italic}
.pred-hero.H .pred-word{color:var(--red)}.pred-hero.M .pred-word{color:var(--amber)}.pred-hero.L .pred-word{color:var(--green)}
.pred-conf{font-size:12px;color:var(--soft);margin-top:7px}
.pred-conf strong{color:var(--body);font-weight:600}
.pred-via{font-size:9px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.prob-row{margin-bottom:6px}
.prob-hd{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:3px}
.prob-hd span:last-child{font-family:var(--mono);color:var(--body)}
.prob-track{height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.prob-fill{height:100%;border-radius:99px;transition:width .65s cubic-bezier(.4,0,.2,1)}

/* ── FLAGS ── */
.flag{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:var(--r8);margin-bottom:7px;border:1px solid}
.flag.critical{background:var(--red2);border-color:var(--red3)}
.flag.warning{background:var(--amb2);border-color:var(--amb3)}
.flag.info{background:var(--cyan2);border-color:var(--cyan3)}
.flag-ico{font-size:13px;margin-top:1px;flex-shrink:0}
.flag-title{font-size:11px;font-weight:700}
.flag.critical .flag-title{color:#fca5a5}
.flag.warning  .flag-title{color:#fcd34d}
.flag.info     .flag-title{color:var(--cyan)}
.flag-detail{font-size:10px;color:var(--dim);margin-top:2px;line-height:1.45}

/* ── SHAP WATERFALL ── */
.shap-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.shap-name{font-size:10px;color:var(--dim);width:120px;flex-shrink:0;text-align:right;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shap-track{flex:1;height:14px;position:relative}
.shap-axis{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.1)}
.shap-bar{height:10px;border-radius:3px;position:absolute;top:2px;transition:width .55s cubic-bezier(.4,0,.2,1)}
.shap-bar.pos{background:linear-gradient(90deg,var(--red),rgba(248,113,113,.4));left:50%}
.shap-bar.neg{background:linear-gradient(270deg,var(--cyan),rgba(56,189,248,.4));right:50%}
.shap-val{font-size:9px;font-family:var(--mono);color:var(--muted);width:52px;flex-shrink:0}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:16px}
.tab{padding:9px 15px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;letter-spacing:.8px}
.tab:hover{color:var(--body)}.tab.on{color:var(--cyan);border-bottom-color:var(--cyan)}

/* ── MODEL CARDS ── */
.mdl-card{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:var(--r12);padding:14px;position:relative;overflow:hidden;transition:border-color .2s}
.mdl-card.sel{border-color:var(--cyan);box-shadow:0 0 0 1px rgba(56,189,248,.15)}
.mdl-top{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r12) var(--r12) 0 0}
.mdl-name{font-size:13px;font-weight:600;color:var(--bright);margin-bottom:10px}
.mrow{display:flex;justify-content:space-between;margin-bottom:5px}
.mkey{font-size:10px;color:var(--muted)}.mval{font-size:10px;font-family:var(--mono);color:var(--body);font-weight:500}

/* ── FEAT BAR ── */
.feat-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.feat-name{font-size:10px;color:var(--soft);font-family:var(--mono);width:145px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feat-track{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.feat-fill{height:100%;border-radius:99px}
.feat-val{font-size:9px;font-family:var(--mono);color:var(--muted);width:46px;text-align:right}

/* ── CM ── */
.cm-wrap{display:inline-grid;grid-template-columns:repeat(4,56px);gap:3px}
.cm-cell{height:44px;display:flex;align-items:center;justify-content:center;font-size:11px;border-radius:5px;font-family:var(--mono)}
.cm-hd{background:transparent;color:var(--muted);font-size:9px;font-weight:600}
.cm-d{background:rgba(56,189,248,.2);color:var(--bright);font-weight:700}
.cm-o{background:rgba(248,113,113,.12);color:#fca5a5}

/* ── DATA TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--r8);border:1px solid var(--line)}
.dtbl{width:100%;border-collapse:collapse;font-size:11px}
.dtbl th{background:rgba(255,255,255,.04);color:var(--cyan);padding:9px 10px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;font-weight:600;border-bottom:1px solid var(--line2);white-space:nowrap}
.dtbl td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.025);color:var(--dim);font-family:var(--mono);white-space:nowrap;font-size:10.5px}
.dtbl tr:hover td{background:rgba(255,255,255,.02)}
.bg-h{background:var(--red2);color:#fca5a5;border-radius:4px;padding:2px 8px;font-size:9px;font-weight:700}
.bg-m{background:var(--amb2);color:#fcd34d;border-radius:4px;padding:2px 8px;font-size:9px;font-weight:700}
.bg-l{background:var(--grn2);color:#6ee7b7;border-radius:4px;padding:2px 8px;font-size:9px;font-weight:700}

/* ── MISC ── */
.spinner{width:28px;height:28px;border:3px solid rgba(56,189,248,.15);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;margin:auto}
@keyframes spin{to{transform:rotate(360deg)}}
.c-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:36px}
.empty-ico{font-size:32px;opacity:.3}
.note-box{border-radius:var(--r8);padding:9px 12px;margin-bottom:8px;border:1px solid;font-size:11px;line-height:1.55}
.note-box.uncertainty{background:var(--amb2);border-color:var(--amb3)}
.note-box.alert{background:var(--red2);border-color:var(--red3)}
.note-box.explanation{background:var(--cyan2);border-color:var(--cyan3)}
.disc{margin-top:12px;padding:9px 12px;border-radius:var(--r8);background:rgba(255,255,255,.03);border:1px solid var(--line);font-size:10px;color:var(--muted);line-height:1.55}
.ov-area{margin-top:12px}
.ov-note{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line2);
  border-radius:var(--r8);padding:7px 10px;color:var(--body);
  font-family:var(--sans);font-size:11px;resize:vertical;outline:none;min-height:48px;margin-top:8px;
}
.ov-note:focus{border-color:var(--cyan)}
.ov-done{margin-top:9px;padding:8px 12px;background:var(--grn2);border-radius:7px;border:1px solid var(--grn3);font-size:11px;color:#6ee7b7}

/* ── TOAST ── */
.toast-stack{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{
  background:var(--bg3);border:1px solid var(--line2);border-radius:var(--r12);
  padding:11px 16px;font-size:12px;display:flex;align-items:center;gap:9px;
  box-shadow:0 16px 48px rgba(0,0,0,.6);min-width:250px;
  animation:t-in .28s ease;
}
@keyframes t-in{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.s{border-color:var(--grn3)}.toast.e{border-color:var(--red3)}.toast.i{border-color:var(--cyan3)}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useCallback,useRef} = React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,Cell,Legend} = Recharts;

/* ──────────────────────────────────────────
   API LAYER — connects to backend_app.py
   All endpoints match exactly:
     GET  /api/health
     GET  /api/dataset/stats
     GET  /api/dataset/sample
     GET  /api/models/metrics
     GET  /api/models/feature_importance
     POST /api/predict
     POST /api/predict/compare
   ────────────────────────────────────────── */
const BASE = 'http://localhost:8080';

async function api(path, opts={}) {
  const r = await fetch(BASE + path, {
    headers: {'Content-Type':'application/json'},
    ...opts
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

const GET  = path => api(path);
const POST = (path, body) => api(path, {method:'POST', body: JSON.stringify(body)});

/* health check → returns {status:'ok'} */
async function checkHealth() {
  try { await GET('/api/health'); return true; }
  catch { return false; }
}

/* ──────────────────────────────────────────
   SMALL COMPONENTS
   ────────────────────────────────────────── */
function ProbBar({label, value, color}) {
  return React.createElement('div', {className:'prob-row'},
    React.createElement('div', {className:'prob-hd'},
      React.createElement('span', null, label),
      React.createElement('span', null, `${(value*100).toFixed(1)}%`)),
    React.createElement('div', {className:'prob-track'},
      React.createElement('div', {className:'prob-fill', style:{width:`${value*100}%`, background:color}})));
}

function ShapBar({feature, value, maxAbs}) {
  const pos = value > 0;
  const pct = Math.min(Math.abs(value) / maxAbs * 46, 46);
  const label = feature.replace('cc_','').replace('arrival_','arr:').replace(/_/g,' ');
  return React.createElement('div', {className:'shap-row'},
    React.createElement('div', {className:'shap-name', title:feature}, label),
    React.createElement('div', {className:'shap-track'},
      React.createElement('div', {className:'shap-axis'}),
      React.createElement('div', {className:`shap-bar ${pos?'pos':'neg'}`, style:{width:`${pct}%`}})),
    React.createElement('div', {className:'shap-val'},
      value > 0 ? `+${value.toFixed(4)}` : value.toFixed(4)));
}

function Flag({f}) {
  const ico = {critical:'🚨', warning:'⚠️', info:'ℹ️'};
  return React.createElement('div', {className:`flag ${f.severity}`},
    React.createElement('span', {className:'flag-ico'}, ico[f.severity]),
    React.createElement('div', null,
      React.createElement('div', {className:'flag-title'}, f.flag),
      React.createElement('div', {className:'flag-detail'}, f.detail)));
}

function Spinner() {
  return React.createElement('div', {className:'c-box'},
    React.createElement('div', {className:'spinner'}));
}

function TBadge({v}) {
  const cls = v==='High'?'bg-h':v==='Medium'?'bg-m':'bg-l';
  return React.createElement('span', {className:cls}, v);
}

/* ──────────────────────────────────────────
   PAGE: PREDICT
   Calls: POST /api/predict
   Returns: prediction, confidence, probabilities,
            explanation, risk_flags, clinical_notes,
            model_used, model_name
   ────────────────────────────────────────── */
function PredictPage({model, apiOk, toast}) {
  const [form, setForm] = useState({
    age:'65', sex:'M', heart_rate:'110', systolic_bp:'85', diastolic_bp:'55',
    temperature_c:'37.2', spo2:'88', resp_rate:'26', gcs:'10', pain_score:'7',
    arrival_mode:'Ambulance', chief_complaint:'Chest Pain',
    comorbidities:'3', prior_ed_visits:'2'
  });
  const [res, setRes]     = useState(null);
  const [busy, setBusy]   = useState(false);
  const [ov, setOv]       = useState(null);
  const [ovNote, setNote] = useState('');

  const set = k => e => setForm(f => ({...f, [k]: e.target.value}));

  const run = async () => {
    if (!apiOk) { toast('Backend offline — start Flask first', 'e'); return; }
    setBusy(true); setRes(null); setOv(null); setNote('');
    try {
      /* POST /api/predict — sends all 14 fields + model key */
      const data = await POST('/api/predict', {...form, model});
      setRes(data);
      toast(`Prediction: ${data.prediction} (${(data.confidence*100).toFixed(1)}%)`, 's');
    } catch(e) {
      toast('Prediction failed: ' + e.message, 'e');
    }
    setBusy(false);
  };

  const PC = {High:'var(--red)', Medium:'var(--amber)', Low:'var(--green)'};
  const cls = res ? res.prediction[0] : '';

  /* explanation comes as {feature: float, ...} from backend */
  const expl = res
    ? Object.entries(res.explanation).sort((a,b) => Math.abs(b[1]) - Math.abs(a[1]))
    : [];
  const maxAbs = expl.length ? Math.max(...expl.map(([,v]) => Math.abs(v))) : 1;

  /* warn inputs at clinical thresholds */
  const warn = {
    gcs: +form.gcs < 9,
    spo2: +form.spo2 < 90,
    systolic_bp: +form.systolic_bp < 90,
    heart_rate: +form.heart_rate > 140 || +form.heart_rate < 45,
    resp_rate: +form.resp_rate > 28,

    ['diastolic_bp','Diastolic BP'],['spo2','SpO₂ (%)'],

  return React.createElement('div', null,
    /* top stats */
    React.createElement('div', {className:'g4', style:{marginBottom:18}},
      [['Patient Age', form.age, `Sex: ${form.sex}`, '--cyan'],
       ['Arrival', form.arrival_mode, form.chief_complaint, '--amber'],
       ['GCS Score', form.gcs, +form.gcs<9?'⚠️ Critical':'Within range', +form.gcs<9?'--red':'--green'],
       ['SpO₂', form.spo2+'%', +form.spo2<90?'⚠️ Hypoxia':'Normal', +form.spo2<90?'--red':'--green'],

        React.createElement('div', {key:i, className:'tile'},
          React.createElement('div', {className:'tile-accent', style:{background:`var(${c})`}}),
          React.createElement('div', {className:'tile-lbl'}, l),
          React.createElement('div', {className:'tile-val', style:{fontSize:22, paddingTop:4}}, v),
          React.createElement('div', {className:'tile-sub'}, s)))
    ),

    React.createElement('div', {className:'g2', style:{gap:20, alignItems:'start'}},

      /* ── INPUT FORM ── */
      React.createElement('div', {className:'card'},
        React.createElement('div', {className:'card-lbl'},
          React.createElement('div', {className:'card-lbl-bar', style:{background:'var(--cyan)'}}),
          'Patient Data Entry'),

        React.createElement('div', {className:'fsec'},
          React.createElement('div', {className:'sec-head'}, '🫀 Vital Signs'),
          React.createElement('div', {className:'fgrid'},
            vitalFields.map(([k,l]) =>
              React.createElement('div', {key:k, className:'fg'},
                React.createElement('label', null, l),
                React.createElement('input', {
                  type:'number', value:form[k], onChange:set(k),
                  ...(warn[k] ? {'data-warn':'1'} : {})

          )
        ),

        React.createElement('div', {className:'fsec'},
          React.createElement('div', {className:'sec-head'}, '🧠 Clinical Indicators'),
          React.createElement('div', {className:'fgrid'},
            [['age','Age (yrs)'],['gcs','GCS (3–15)'],['pain_score','Pain (0–10)'],
             ['comorbidities','Comorbidities'],['prior_ed_visits','Prior ED Visits']].map(([k,l]) =>
              React.createElement('div', {key:k, className:'fg'},
                React.createElement('label', null, l),
                React.createElement('input', {
                  type:'number', value:form[k], onChange:set(k),
                  ...(warn[k] ? {'data-warn':'1'} : {})
                })
              )).concat([
              React.createElement('div', {key:'sex', className:'fg'},
                React.createElement('label', null, 'Sex'),
                React.createElement('select', {value:form.sex, onChange:set('sex')},
                  React.createElement('option', {value:'M'}, 'Male'),
                  React.createElement('option', {value:'F'}, 'Female')))

          )
        ),

        React.createElement('div', {className:'fsec'},
          React.createElement('div', {className:'sec-head'}, '🏥 Clinical Context'),
          React.createElement('div', {className:'fgrid'},
            React.createElement('div', {className:'fg'},
              React.createElement('label', null, 'Arrival Mode'),
              React.createElement('select', {value:form.arrival_mode, onChange:set('arrival_mode')},
                ['Walk-in','Ambulance','Transfer'].map(v =>
                  React.createElement('option', {key:v, value:v}, v)))),
            React.createElement('div', {className:'fg'},
              React.createElement('label', null, 'Chief Complaint'),
              React.createElement('select', {value:form.chief_complaint, onChange:set('chief_complaint')},
                ['Chest Pain','Dyspnea','Abdominal Pain','Trauma','Headache',
                 'Fever','Syncope','Altered Mental Status','Laceration','Other'].map(v =>
                  React.createElement('option', {key:v, value:v}, v))))
          )
        ),

        React.createElement('button', {className:'btn-run', onClick:run, disabled:busy},
          busy ? '⟳  Calling /api/predict…' : '🔍  Run Triage Prediction + XAI')
      ),

      /* ── RESULT PANEL ── */
      React.createElement('div', {style:{display:'flex', flexDirection:'column', gap:14}},

        res ? [
          /* prediction hero — maps to: prediction, confidence, probabilities, model_name */
          React.createElement('div', {key:'hero', className:`pred-hero ${cls}`},
            React.createElement('div', {className:'pred-sub'}, 'AI Triage Recommendation'),
            React.createElement('div', {className:'pred-word'}, res.prediction),
            React.createElement('div', {className:'pred-conf'},
              'Confidence: ', React.createElement('strong', null, `${(res.confidence*100).toFixed(1)}%`)),
            React.createElement('div', {className:'pred-via'}, `${res.model_name} · live`),
            React.createElement('div', {style:{marginTop:14}},
              ['High','Medium','Low'].map(k =>
                React.createElement(ProbBar, {key:k, label:k, value:res.probabilities[k], color:PC[k]}))),
            !ov && React.createElement('div', {className:'ov-area'},
              React.createElement('div', {style:{fontSize:10, color:'var(--soft)', marginBottom:7}}, '⚡ Clinician Override:'),
              React.createElement('div', {style:{display:'flex', gap:7}},
                ['High','Medium','Low'].map(l =>
                  React.createElement('button', {key:l, className:`btn-ov ${l[0]}`,
                    onClick:() => {setOv(l); toast(`Override recorded → ${l}`, 's');}},
                    `→ ${l}`))),
              React.createElement('textarea', {className:'ov-note',
                placeholder:'Optional: clinical rationale for override…',
                value:ovNote, onChange:e=>setNote(e.target.value)})),
            ov && React.createElement('div', {className:'ov-done'},
              `✓ Overridden to ${ov} by clinician.${ovNote?' Note: '+ovNote:''}`)
          ),

          /* risk flags — maps to: risk_flags[] from backend */
          res.risk_flags.length > 0 && React.createElement('div', {key:'flags', className:'card'},
            React.createElement('div', {className:'card-lbl'},
              React.createElement('div', {className:'card-lbl-bar', style:{background:'var(--red)'}}),
              `Clinical Risk Flags (${res.risk_flags.length})`),
            res.risk_flags.map((f,i) => React.createElement(Flag, {key:i, f})))

        ] : busy
          ? React.createElement('div', {className:'card'}, React.createElement(Spinner))
          : React.createElement('div', {className:'card c-box'},
              React.createElement('div', {className:'empty-ico'}, '🏥'),

/* ──────────────────────────────────────────
   PAGE: ANALYTICS
   Calls:
     GET /api/models/metrics → accuracy, auc, cv_mean, cv_std,

   ────────────────────────────────────────── */

  const [tab, setTab]   = useState('comparison');

      GET('/api/models/metrics'),
      GET('/api/models/feature_importance'),
    ]).then(([m, fi]) => {
      setM(m);

      setImp(fi.random_forest || fi[Object.keys(fi)[0]]);

  const COLS = ['#1d4ed8','#0e7490','#059669'];

  const cm = metrics[model] ? metrics[model].confusion_matrix : null;
  const CN = ['High','Low','Medium'];

  return React.createElement('div', null,
    React.createElement('div', {className:'g4', style:{marginBottom:18}},
      [['Best Accuracy', `${(Math.max(...Object.values(metrics).map(v=>v.accuracy))*100).toFixed(1)}%`, 'Gradient Boosting', '--green'],

       ['Train Set', '160', '80% of 200 records', '--vio'],

      ].map(([l,v,s,c],i) =>
        React.createElement('div', {key:i, className:'tile'},
          React.createElement('div', {className:'tile-accent', style:{background:`var(${c})`}}),
          React.createElement('div', {className:'tile-lbl'}, l),
          React.createElement('div', {className:'tile-val', style:{fontSize:22, paddingTop:4}}, v),
          React.createElement('div', {className:'tile-sub'}, s)))
    ),

    React.createElement('div', {className:'tabs'},

        React.createElement('div', {key:t, className:`tab ${tab===t?'on':''}`, onClick:()=>setTab(t)}, l))),

    /* ── comparison tab ── */
    tab==='comparison' && React.createElement('div', null,
      React.createElement('div', {className:'g2', style:{gap:18, marginBottom:18}},
        React.createElement('div', {className:'card'},
          React.createElement('div', {className:'card-lbl'},
            React.createElement('div', {className:'card-lbl-bar', style:{background:'var(--cyan)'}}),
            'Accuracy & AUC (×100) — from /api/models/metrics'),
          React.createElement(ResponsiveContainer, {width:'100%', height:210},
            React.createElement(BarChart, {data:barData, margin:{top:6,right:6,left:-22,bottom:4}},
              React.createElement(XAxis, {dataKey:'name', tick:{fill:'var(--soft)',fontSize:12}}),
              React.createElement(YAxis, {tick:{fill:'var(--muted)',fontSize:10}, domain:[50,100]}),
              React.createElement(Tooltip, {contentStyle:{background:'var(--bg3)',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,color:'var(--body)'},formatter:v=>`${v}%`}),
              React.createElement(Legend, {wrapperStyle:{fontSize:10,color:'var(--soft)'}}),
              React.createElement(Bar, {dataKey:'accuracy', name:'Accuracy %', fill:'var(--cyan)', radius:[3,3,0,0]}),
              React.createElement(Bar, {dataKey:'auc', name:'AUC×100', fill:'var(--green)', radius:[3,3,0,0]})))),
        React.createElement('div', {className:'card'},
          React.createElement('div', {className:'card-lbl'},
            React.createElement('div', {className:'card-lbl-bar', style:{background:'var(--vio)'}}),
            '5-Fold Cross-Validation Accuracy'),
          React.createElement(ResponsiveContainer, {width:'100%', height:210},
            React.createElement(BarChart, {data:barData},
              React.createElement(XAxis, {dataKey:'fullName', tick:{fill:'var(--soft)',fontSize:9}}),
              React.createElement(YAxis, {tick:{fill:'var(--muted)',fontSize:10}, domain:[50,100]}),
              React.createElement(Tooltip, {contentStyle:{background:'var(--bg3)',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,color:'var(--body)'},formatter:v=>`${v}%`}),
              React.createElement(Bar, {dataKey:'cv', name:'CV Accuracy %', radius:[3,3,0,0]},
                barData.map((_,i) => React.createElement(Cell, {key:i, fill:COLS[i]}))))))
      ),
      React.createElement('div', {className:'g3', style:{gap:14}},
        Object.entries(metrics).map(([k,v], mi) =>

            React.createElement('div', {className:'mdl-top', style:{background:COLS[mi]}}),
            React.createElement('div', {className:'mdl-name'}, v.name),
            [['Accuracy', `${(v.accuracy*100).toFixed(2)}%`],
             ['ROC-AUC', v.auc.toFixed(4)],
             ['CV Mean', `${(v.cv_mean*100).toFixed(2)}%`],

}

          React.createElement('tbody', null,
            filtered.map((r,i) =>
              React.createElement('tr', {key:i},
                React.createElement('td', null, r.age),
                React.createElement('td', null, r.sex),
                React.createElement('td', {style:{color:r.heart_rate>140?'var(--red)':''}}, r.heart_rate),
                React.createElement('td', {style:{color:r.systolic_bp<90?'var(--red)':''}}, r.systolic_bp),

      React.createElement('div', {className:'empty-ico'}, '🗄️'),

  );
}

/* ──────────────────────────────────────────
   ROOT APP
   ────────────────────────────────────────── */
function App() {
  const [page, setPage]   = useState('predict');
  const [model, setModel] = useState('random_forest');
  const [apiOk, setApiOk] = useState(null);
  const [toasts, setToasts] = useState([]);

  /* poll health every 6s — GET /api/health → {status:'ok'} */
  useEffect(() => {
    const check = async () => { setApiOk(await checkHealth()); };
    check();
    const id = setInterval(check, 6000);
    return () => clearInterval(id);
  }, []);

  const toast = useCallback((msg, type='i') => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  const nav = [
    {sec:'Application', items:[
      {id:'predict',   ico:'🔍', lbl:'Triage Predict'},
      {id:'analytics', ico:'📊', lbl:'Model Analytics'},
    ]},
    {sec:'Data', items:[
      {id:'dataset', ico:'🗄️', lbl:'Dataset Explorer'},
    ]},
  ];

  const titles = {predict:'Triage Prediction', analytics:'Model Analytics', dataset:'Dataset Explorer'};
  const apiLbl = apiOk===null ? 'Checking…' : apiOk ? 'API Online · localhost:5000' : 'API Offline';
  const dotCls = apiOk===null ? 'spin' : apiOk ? 'live' : 'dead';

  const props = {model, apiOk: !!apiOk, toast};

  return React.createElement('div', {className:'shell'},

    /* SIDEBAR */
    React.createElement('aside', {className:'sidebar'},
      React.createElement('div', {className:'brand'},
        React.createElement('div', {className:'brand-mark'},
          React.createElement('div', {className:'brand-hex'}, '🏥'),
          React.createElement('div', {className:'brand-name'}, 'ED Triage XAI')),
        React.createElement('div', {className:'brand-sub'},
          'Explainable ML for\nClinical Decision Support')),
      nav.map(g => React.createElement('div', {key:g.sec, className:'nav-sec'},
        React.createElement('div', {className:'nav-sec-lbl'}, g.sec),
        g.items.map(n => React.createElement('div', {key:n.id,
          className:`nav-item ${page===n.id?'on':''}`,
          onClick:()=>setPage(n.id)},
          React.createElement('span', {className:'nav-ico'}, n.ico),
          React.createElement('span', null, n.lbl))))),
      React.createElement('div', {className:'sidebar-foot'},
        React.createElement('div', {className:'api-card'},
          React.createElement('div', {className:'api-row'},
            React.createElement('div', {className:`api-dot ${dotCls}`}),
            React.createElement('div', {className:'api-lbl'}, apiOk ? 'Flask API Running' : apiOk===null ? 'Connecting…' : 'Flask API Offline')),
          React.createElement('div', {className:'api-url'}, 'localhost:5000 · N=200'))
      )
    ),

    /* MAIN */
    React.createElement('main', {className:'main'},
      React.createElement('div', {className:'topbar'},
        React.createElement('div', {className:'topbar-l'},
          React.createElement('div', {className:'page-title'}, titles[page]),
          React.createElement('div', {className:'live-chip'},
            React.createElement('div', {className:'live-chip-dot'}),
            apiOk ? 'Connected to Flask' : 'Offline')),
        React.createElement('div', {className:'topbar-r'},
          React.createElement('div', {className:'model-sel-wrap'},
            React.createElement('label', null, 'Model'),
            React.createElement('select', {value:model, onChange:e=>setModel(e.target.value)},
              [['logistic_regression','Logistic Regression'],
               ['random_forest','Random Forest'],
               ['gradient_boosting','Gradient Boosting']].map(([k,l]) =>
                React.createElement('option', {key:k, value:k}, l)))))
      ),
      React.createElement('div', {className:'page'},
        page==='predict'   ? React.createElement(PredictPage,  props) :
        page==='analytics' ? React.createElement(AnalyticsPage, props) :
                             React.createElement(DatasetPage,   props)
      )
    ),

    /* TOASTS */
    React.createElement('div', {className:'toast-stack'},
      toasts.map(t => React.createElement('div', {key:t.id, className:`toast ${t.type}`},
        React.createElement('span', null, t.type==='s'?'✅':t.type==='e'?'❌':'ℹ️'),
        React.createElement('span', null, t.msg))))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
